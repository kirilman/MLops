version: '3.8'
services:
  car-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mlops-car-api
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Ограничение ресурсов (Best Practice из лекции)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
